version: '3.9'

# =============================================================
# NexusHub - Full Stack Docker Compose
# Run: docker-compose up -d
# Stop: docker-compose down -v
# =============================================================

networks:
  nexushub-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  clickhouse_data:
  minio_data:
  grafana_data:
  prometheus_data:

services:

  # ============================================================
  # INFRASTRUCTURE - Databases & Messaging
  # ============================================================

  # PostgreSQL - for Auth & User services
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexushub-postgres
    environment:
      POSTGRES_USER: nexushub
      POSTGRES_PASSWORD: nexushub_secret
      POSTGRES_DB: nexushub_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - nexushub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexushub"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB - for Content service
  mongodb:
    image: mongo:7.0
    container_name: nexushub-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: nexushub
      MONGO_INITDB_ROOT_PASSWORD: nexushub_secret
      MONGO_INITDB_DATABASE: nexushub_content
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./infrastructure/docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js
    networks:
      - nexushub-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - caching, sessions, pub/sub, rate limiting
  redis:
    image: redis:7.2-alpine
    container_name: nexushub-redis
    command: redis-server --requirepass nexushub_secret --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nexushub-network
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "nexushub_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ClickHouse - for Analytics service
  clickhouse:
    image: clickhouse/clickhouse-server:23.12
    container_name: nexushub-clickhouse
    environment:
      CLICKHOUSE_DB: nexushub_analytics
      CLICKHOUSE_USER: nexushub
      CLICKHOUSE_PASSWORD: nexushub_secret
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infrastructure/docker/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - nexushub-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO - S3-compatible object storage for files/images
  minio:
    image: minio/minio:latest
    container_name: nexushub-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nexushub
      MINIO_ROOT_PASSWORD: nexushub_secret_minio
    ports:
      - "9002:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    volumes:
      - minio_data:/data
    networks:
      - nexushub-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # KAFKA - Event Streaming
  # ============================================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: nexushub-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - nexushub-network
    healthcheck:
      test: echo srvr | nc zookeeper 2181 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: nexushub-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - nexushub-network
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 15s
      timeout: 10s
      retries: 5

  # Kafka UI - visual topic/message browser
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: nexushub-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: nexushub-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8090:8080"
    networks:
      - nexushub-network

  # Kafka topic initializer - creates all required topics
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: nexushub-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Waiting for Kafka to be ready...'
      sleep 10
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic user-events --replication-factor 1 --partitions 3
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic post-events --replication-factor 1 --partitions 3
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic notification-events --replication-factor 1 --partitions 3
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ai-job-requests --replication-factor 1 --partitions 3
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ai-job-results --replication-factor 1 --partitions 3
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic audit-log --replication-factor 1 --partitions 1
      echo 'Topics created successfully!'
      kafka-topics --bootstrap-server kafka:29092 --list
      "
    networks:
      - nexushub-network

  # ============================================================
  # OBSERVABILITY - Monitoring & Tracing
  # ============================================================

  # Prometheus - metrics collection
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: nexushub-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - nexushub-network

  # Grafana - metrics dashboards
  grafana:
    image: grafana/grafana:10.2.0
    container_name: nexushub-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: nexushub_admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/docker/grafana/provisioning:/etc/grafana/provisioning
      - ./infrastructure/docker/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - nexushub-network

  # Zipkin - distributed tracing
  zipkin:
    image: openzipkin/zipkin:3.0
    container_name: nexushub-zipkin
    ports:
      - "9411:9411"
    networks:
      - nexushub-network

  # ============================================================
  # SPRING CLOUD - Service Discovery & Config
  # ============================================================

  # Eureka Service Discovery
  eureka-server:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile.eureka
    container_name: nexushub-eureka
    ports:
      - "8761:8761"
    networks:
      - nexushub-network
    environment:
      - SPRING_PROFILES_ACTIVE=docker

  # ============================================================
  # APPLICATION SERVICES
  # ============================================================

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: nexushub-api-gateway
    depends_on:
      - eureka-server
      - redis
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PASSWORD=nexushub_secret
      - JWT_SECRET=${JWT_SECRET:-nexushub_jwt_secret_key_change_in_production_min_256_bits}
    networks:
      - nexushub-network

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: nexushub-auth-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/nexushub_auth
      - SPRING_DATASOURCE_USERNAME=nexushub
      - SPRING_DATASOURCE_PASSWORD=nexushub_secret
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PASSWORD=nexushub_secret
      - JWT_SECRET=${JWT_SECRET:-nexushub_jwt_secret_key_change_in_production_min_256_bits}
      - JWT_ACCESS_TOKEN_EXPIRY=900000
      - JWT_REFRESH_TOKEN_EXPIRY=604800000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - ZIPKIN_BASE_URL=http://zipkin:9411
    networks:
      - nexushub-network

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: nexushub-user-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/nexushub_users
      - SPRING_DATASOURCE_USERNAME=nexushub
      - SPRING_DATASOURCE_PASSWORD=nexushub_secret
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PASSWORD=nexushub_secret
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - ZIPKIN_BASE_URL=http://zipkin:9411
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=nexushub
      - MINIO_SECRET_KEY=nexushub_secret_minio
    networks:
      - nexushub-network

  content-service:
    build:
      context: ./services/content-service
      dockerfile: Dockerfile
    container_name: nexushub-content-service
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATA_MONGODB_URI=mongodb://nexushub:nexushub_secret@mongodb:27017/nexushub_content?authSource=admin
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PASSWORD=nexushub_secret
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - ZIPKIN_BASE_URL=http://zipkin:9411
    networks:
      - nexushub-network

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: nexushub-ai-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-your_api_key_here}
      - ANTHROPIC_MODEL=claude-sonnet-4-20250514
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/nexushub_ai
      - SPRING_DATASOURCE_USERNAME=nexushub
      - SPRING_DATASOURCE_PASSWORD=nexushub_secret
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PASSWORD=nexushub_secret
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - ZIPKIN_BASE_URL=http://zipkin:9411
    networks:
      - nexushub-network

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: nexushub-notification-service
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PASSWORD=nexushub_secret
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - ZIPKIN_BASE_URL=http://zipkin:9411
    networks:
      - nexushub-network

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    container_name: nexushub-analytics-service
    depends_on:
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CLICKHOUSE_URL=jdbc:clickhouse://clickhouse:8123/nexushub_analytics
      - CLICKHOUSE_USERNAME=nexushub
      - CLICKHOUSE_PASSWORD=nexushub_secret
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - ZIPKIN_BASE_URL=http://zipkin:9411
    networks:
      - nexushub-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexushub-frontend
    depends_on:
      - api-gateway
    ports:
      - "3000:80"
    networks:
      - nexushub-network
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
      - VITE_WS_URL=ws://localhost:8080
