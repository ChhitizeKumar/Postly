server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: localhost
      port: 6379
      password: nexushub_secret

  cloud:
    gateway:
      # Global CORS
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "https://nexushub.app"
            allowedMethods: [GET, POST, PUT, DELETE, PATCH, OPTIONS]
            allowedHeaders: ["*"]
            allowCredentials: true
            maxAge: 3600

      # Default filters applied to all routes
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 20
            redis-rate-limiter.burstCapacity: 50
            redis-rate-limiter.requestedTokens: 1

      routes:
        # ===================================================
        # Auth Service Routes (no JWT required)
        # ===================================================
        - id: auth-service-public
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: auth-cb
                fallbackUri: forward:/fallback/auth

        # ===================================================
        # User Service Routes
        # ===================================================
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=0
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: user-cb
                fallbackUri: forward:/fallback/default
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60

        # ===================================================
        # Content Service Routes
        # ===================================================
        - id: content-service-public
          uri: lb://content-service
          predicates:
            - Path=/api/v1/posts/**, /api/v1/tags/**
            - Method=GET
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: content-cb
                fallbackUri: forward:/fallback/default

        - id: content-service-protected
          uri: lb://content-service
          predicates:
            - Path=/api/v1/posts/**, /api/v1/comments/**
            - Method=POST, PUT, DELETE, PATCH
          filters:
            - StripPrefix=0
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: content-cb
                fallbackUri: forward:/fallback/default

        # ===================================================
        # AI Service Routes (rate limited aggressively)
        # ===================================================
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/v1/ai/**
          filters:
            - StripPrefix=0
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: ai-cb
                fallbackUri: forward:/fallback/ai
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10

        # ===================================================
        # Notification Service (WebSocket + REST)
        # ===================================================
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**, /ws/**
          filters:
            - StripPrefix=0
            - AuthenticationFilter

        # ===================================================
        # Analytics Service
        # ===================================================
        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/v1/analytics/**
          filters:
            - StripPrefix=0
            - AuthenticationFilter

      # Circuit breaker config
      httpclient:
        connect-timeout: 3000
        response-timeout: 10s

# Resilience4j circuit breakers
resilience4j:
  circuitbreaker:
    instances:
      auth-cb:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
      content-cb:
        sliding-window-size: 20
        failure-rate-threshold: 60
        wait-duration-in-open-state: 15s
      ai-cb:
        sliding-window-size: 5
        failure-rate-threshold: 40
        wait-duration-in-open-state: 30s
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50

# JWT (for validation at gateway)
jwt:
  secret: ${JWT_SECRET:nexushub_jwt_secret_key_change_in_production}

# Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, gateway
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.nexushub: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [traceId=%X{traceId}] %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: docker
  data:
    redis:
      host: redis

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
