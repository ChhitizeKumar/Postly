server:
  port: 8081

spring:
  application:
    name: auth-service

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/postly_auth
    username: postly
    password: postly_secret
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update        # auto-creates tables on startup
    show-sql: true            # see SQL in logs while developing
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password: postly_secret

  # Kafka
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

# JWT settings
jwt:
  secret: postly_super_secret_jwt_key_must_be_at_least_256_bits_long_change_in_prod
  access-token-expiry-ms: 900000      # 15 minutes
  refresh-token-expiry-ms: 604800000  # 7 days

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.postly: DEBUG
    org.springframework.security: DEBUG
